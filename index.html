<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizmaker 2.0</title>
<style>
:root {
  --bg-body: #0f172a;
  --bg-card: #1e293b;
  --bg-card2: #253348;
  --border: #334155;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --dim: #64748b;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --success: #22c55e;
  --error: #ef4444;
  --input-bg: #fff;
  --input-text: #1e293b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg-body);
  color: var(--text);
  font-family: Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
}
.screen { display:none; flex-direction:column; min-height:100vh; }
.screen.active { display:flex; }
::-webkit-scrollbar { width:7px; height:7px; }
::-webkit-scrollbar-track { background: var(--bg-body); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
input[type="text"], input[type="number"], textarea, select {
  background: var(--input-bg);
  color: var(--input-text);
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  padding: 9px 13px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
  border-color: var(--accent);
}
textarea { resize:vertical; min-height:70px; }
select { cursor:pointer; }
.top-bar {
  display:flex; align-items:center; gap:12px;
  padding:14px 22px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink:0;
}
.top-bar h1 { font-size:20px; font-weight:700; white-space:nowrap; }
.top-bar .spacer { flex:1; }
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 18px;
  border:none; border-radius:10px;
  font-size:13px; font-weight:600;
  cursor:pointer; white-space:nowrap;
  transition: background 0.18s, transform 0.1s;
  font-family:inherit;
}
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-secondary { background:#334155; color:var(--text); }
.btn-secondary:hover { background:#3e4f68; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#16a34a; }
.btn-danger { background:var(--error); color:#fff; }
.btn-danger:hover { background:#dc2626; }
.btn-sm { padding:6px 13px; font-size:12px; }
.btn-xs { padding:4px 10px; font-size:11px; border-radius:7px; }
.card {
  background: var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
}
.label {
  display:block;
  font-size:12px; font-weight:600;
  color:var(--muted);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.badge {
  display:inline-block;
  padding:2px 8px;
  border-radius:6px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3px;
}
.badge-mc { background:#3b82f6; color:#fff; }
.badge-ms { background:#6366f1; color:#fff; }
.badge-tf { background:#14b8a6; color:#fff; }
.badge-sa { background:#f59e0b; color:#fff; }
.badge-mat { background:#f97316; color:#fff; }
.badge-ord { background:#ec4899; color:#fff; }
.toggle-track {
  width:44px; height:24px;
  background:#475569;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  transition:background 0.2s;
  flex-shrink:0;
}
.toggle-track.on { background:var(--accent); }
.toggle-knob {
  width:18px; height:18px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:3px; left:3px;
  transition:left 0.2s;
}
.toggle-track.on .toggle-knob { left:23px; }
.toggle-row {
  display:flex; align-items:center; gap:12px;
  padding:8px 0;
}
.theme-dot {
  width:36px; height:36px;
  border-radius:50%;
  cursor:pointer;
  border:3px solid transparent;
  transition:border-color 0.2s, transform 0.15s;
}
.theme-dot:hover { transform:scale(1.15); }
.theme-dot.active { border-color:#fff; }
.pill-btn {
  padding:7px 16px;
  border:2px solid var(--border);
  background:transparent;
  color:var(--muted);
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  font-family:inherit;
}
.pill-btn.active {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
#home-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:18px;
  padding:24px;
}
#home-empty {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  color:var(--dim);
  font-size:16px;
  gap:10px;
  padding:60px 20px;
  text-align:center;
}
.quiz-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:border-color 0.2s;
}
.quiz-card:hover { border-color:var(--accent); }
.quiz-card-top { display:flex; align-items:center; gap:10px; }
.quiz-card-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.quiz-card-title { font-size:16px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.quiz-card-meta { font-size:12px; color:var(--dim); }
.quiz-card-actions { display:flex; gap:8px; }
.editor-layout {
  display:flex; flex:1; overflow:hidden;
}
.editor-sidebar {
  width:270px;
  background:var(--bg-card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow-y:auto;
}
.editor-sidebar-header {
  padding:14px 16px 8px;
  font-size:11px;
  font-weight:700;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:1px;
}
#slide-list { flex:1; overflow-y:auto; padding:0 8px; }
.slide-item {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:background 0.15s;
  margin-bottom:2px;
  font-size:13px;
}
.slide-item:hover { background:var(--bg-card2); }
.slide-item.active { background:var(--accent); color:#fff; }
.slide-item .si-num { font-weight:700; font-size:12px; width:20px; text-align:center; flex-shrink:0; }
.slide-item .si-preview { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:12px; }
.slide-item.active .si-preview { color:rgba(255,255,255,0.8); }
.sidebar-add-btns {
  padding:10px 10px 6px;
  display:flex; flex-direction:column; gap:4px;
  border-top:1px solid var(--border);
}
.sidebar-add-btns .btn { font-size:12px; justify-content:flex-start; padding:7px 12px; border-radius:8px; }
.sidebar-ctrl-btns {
  padding:6px 10px 12px;
  display:flex; gap:6px;
}
.sidebar-ctrl-btns .btn { flex:1; justify-content:center; font-size:11px; padding:6px 6px; }
#ed-main {
  flex:1;
  overflow-y:auto;
  padding:24px;
}
.player-body-wrap {
  flex:1;
  display:flex;
  justify-content:center;
  padding:24px;
  overflow-y:auto;
}
#pl-body {
  width:100%;
  max-width:720px;
}
.progress-bar-track {
  width:100%;
  height:8px;
  background:rgba(255,255,255,0.12);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:12px;
}
.progress-bar-fill {
  height:100%;
  border-radius:4px;
  transition:width 0.35s;
}
.player-q-text {
  font-size:20px;
  font-weight:700;
  margin:16px 0 20px;
  line-height:1.4;
}
.opt-card {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background:rgba(255,255,255,0.06);
  border:2px solid transparent;
  border-radius:12px;
  cursor:pointer;
  transition:all 0.18s;
  margin-bottom:8px;
  font-size:15px;
}
.opt-card:hover { background:rgba(255,255,255,0.1); }
.opt-card.selected { border-color:var(--accent); background:rgba(37,99,235,0.12); }
.opt-card.correct-highlight { border-color:var(--success); background:rgba(34,197,94,0.12); }
.opt-card.incorrect-highlight { border-color:var(--error); background:rgba(239,68,68,0.12); }
.opt-letter {
  width:32px; height:32px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px;
  background:rgba(255,255,255,0.1);
  flex-shrink:0;
}
.opt-card.selected .opt-letter { background:var(--accent); color:#fff; }
.opt-card.correct-highlight .opt-letter { background:var(--success); color:#fff; }
.opt-card.incorrect-highlight .opt-letter { background:var(--error); color:#fff; }
.feedback-box {
  padding:14px 18px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  margin-top:14px;
}
.feedback-correct { background:rgba(34,197,94,0.15); color:var(--success); }
.feedback-incorrect { background:rgba(239,68,68,0.15); color:var(--error); }
.player-nav-btns {
  display:flex; gap:10px; margin-top:24px; justify-content:flex-end;
}
.results-wrap { text-align:center; padding:30px 0; }
.results-score {
  font-size:72px; font-weight:800;
  margin:10px 0;
}
.results-msg {
  font-size:18px; font-weight:600;
  margin:10px 0 20px;
}
.review-item {
  text-align:left;
  padding:16px;
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  margin-bottom:10px;
}
.review-q { font-weight:600; font-size:14px; margin-bottom:6px; }
.review-detail { font-size:13px; color:var(--muted); }
.footer {
  text-align:center;
  padding:16px;
  font-size:12px;
  color:var(--dim);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.ord-item {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  margin-bottom:6px;
  font-size:15px;
}
.ord-item .ord-num { font-weight:700; color:var(--dim); width:24px; text-align:center; }
.ord-item .ord-text { flex:1; }
.ord-item .ord-btns { display:flex; gap:4px; }
.ord-item .ord-btns .btn { padding:4px 8px; font-size:11px; }
.mat-row {
  display:flex; align-items:center; gap:10px;
  margin-bottom:8px;
}
.mat-row .mat-left {
  flex:1;
  padding:10px 14px;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  font-size:14px;
  font-weight:600;
}
.mat-row select { max-width:200px; }
.mat-arrow { color:var(--dim); font-size:18px; }

@media(max-width:768px) {
  .editor-layout { flex-direction:column; }
  .editor-sidebar { width:100%; max-height:260px; border-right:none; border-bottom:1px solid var(--border); }
  #home-grid { grid-template-columns:1fr; padding:16px; }
  .row2 { grid-template-columns:1fr; }
  .top-bar { padding:10px 14px; gap:8px; flex-wrap:wrap; }
  .top-bar h1 { font-size:16px; }
  .btn { padding:7px 12px; font-size:12px; }
  #ed-main { padding:16px; }
}
</style>
</head>
<body>


<!-- ========== HOME SCREEN ========== -->
<div id="screen-home" class="screen active">
  <div class="top-bar">
    <h1>&#128203; Quizmaker 2.0</h1>
    <div class="spacer"></div>
    <button id="btn-import-qz2" class="btn btn-secondary">&#128194; Import .qz2</button>
    <button id="btn-new-quiz" class="btn btn-primary">+ New Quiz</button>
  </div>
  <div id="home-empty">
    <div style="font-size:48px;">&#128203;</div>
    <div>No quizzes yet. Click <strong>+ New Quiz</strong> to start.</div>
  </div>
  <div id="home-grid"></div>
  <div class="footer">Made by Copilot</div>
</div>

<!-- ========== EDITOR SCREEN ========== -->
<div id="screen-editor" class="screen">
  <div class="top-bar">
    <button id="btn-back-home" class="btn btn-secondary">&larr; Home</button>
    <span id="ed-quiz-title" style="font-weight:700;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:8px;"></span>
    <div class="spacer"></div>
    <button id="btn-preview" class="btn btn-success">&#9654; Preview</button>
    <button id="btn-save-quiz" class="btn btn-primary">&#128190; Save</button>
  </div>
  <div class="editor-layout">
    <div class="editor-sidebar">
      <div class="editor-sidebar-header">Slides</div>
      <div id="slide-list"></div>
      <div class="sidebar-add-btns">
        <button id="btn-add-mc" class="btn btn-secondary">&#65291; Multiple Choice</button>
        <button id="btn-add-ms" class="btn btn-secondary">&#65291; Multiple Select</button>
        <button id="btn-add-tf" class="btn btn-secondary">&#65291; True / False</button>
        <button id="btn-add-sa" class="btn btn-secondary">&#65291; Short Answer</button>
        <button id="btn-add-mat" class="btn btn-secondary">&#65291; Matching</button>
        <button id="btn-add-ord" class="btn btn-secondary">&#65291; Ordering</button>
      </div>
      <div class="sidebar-ctrl-btns">
        <button id="btn-slide-up" class="btn btn-secondary btn-xs">&#9650; Up</button>
        <button id="btn-slide-dn" class="btn btn-secondary btn-xs">&#9660; Down</button>
        <button id="btn-slide-del" class="btn btn-danger btn-xs">&#10005; Delete</button>
      </div>
    </div>
    <div id="ed-main"></div>
  </div>
  <div class="footer">Made by Copilot</div>
</div>

<!-- ========== PLAYER SCREEN ========== -->
<div id="screen-player" class="screen">
  <div class="top-bar">
    <button id="btn-exit-player" class="btn btn-secondary">&#10005; Exit</button>
    <span id="pl-title" style="font-weight:700;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:8px;"></span>
  </div>
  <div class="player-body-wrap">
    <div id="pl-body"></div>
  </div>
  <div class="footer">Made by Copilot</div>
</div>

<script>
var quizzes = [];
var currentQuiz = null;
var currentSlideIdx = -1;
var playerQuiz = null;
var playerSlideIdx = 0;
var playerAnswers = {};
var playerGraded = {};
var playerOrdOrders = {};
var playerMcOrders = {};
var playerReturnScreen = "screen-home";

var THEMES = {
  "ocean":  { color:"#2563eb", g1:"#0f172a", g2:"#1e3a5f" },
  "sunset": { color:"#f59e0b", g1:"#1c0505", g2:"#431407" },
  "forest": { color:"#10b981", g1:"#052e16", g2:"#064e3b" },
  "violet": { color:"#8b5cf6", g1:"#1e1b4b", g2:"#2e1065" },
  "rose":   { color:"#f43f5e", g1:"#1c0010", g2:"#4c0519" },
  "slate":  { color:"#64748b", g1:"#0f172a", g2:"#1e293b" }
};

var BADGE_MAP = {
  "mc":"MC", "ms":"MS", "tf":"TF", "sa":"SA", "mat":"MAT", "ord":"ORD"
};

var TYPE_LABELS = {
  "mc":"Multiple Choice", "ms":"Multiple Select", "tf":"True / False",
  "sa":"Short Answer", "mat":"Matching", "ord":"Ordering"
};

function uid() { return Math.random().toString(16).slice(2,10); }

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function saveToStorage() {
  try { localStorage.setItem("qm2_data", JSON.stringify(quizzes)); } catch(e) {}
}

function loadFromStorage() {
  try {
    var raw = localStorage.getItem("qm2_data");
    if (raw) { quizzes = JSON.parse(raw); }
    if (!Array.isArray(quizzes)) quizzes = [];
  } catch(e) { quizzes = []; }
}

function downloadBlob(content, filename, mime) {
  var blob = new Blob([content], {type: mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function showToast(msg) {
  var t = document.createElement("div");
  t.style.cssText = "position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) document.body.removeChild(t); }, 2500);
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) {
    screens[i].style.display = "none";
    screens[i].classList.remove("active");
  }
  var target = document.getElementById(id);
  if (target) {
    target.style.display = "flex";
    target.classList.add("active");
  }
}

function makeQuiz() {
  return {
    id: uid(),
    title: "Untitled Quiz",
    theme: "ocean",
    fontFamily: "Arial",
    btnStyle: "rounded",
    passScore: 70,
    shuffle: false,
    shuffleAnswers: false,
    feedbackMode: "immediate",
    showScore: true,
    showReview: true,
    passingMessage: "Congratulations! You passed!",
    failingMessage: "Keep practicing. You can do it!",
    slides: []
  };
}

function makeSlide(qType) {
  var s = {
    id: uid(),
    qType: qType,
    question: "",
    correctFeedback: "",
    incorrectFeedback: "",
    options: ["","","",""],
    correct: 0,
    pairs: [{l:"",r:""},{l:"",r:""}],
    items: ["","",""],
    acceptedAnswers: [""]
  };
  if (qType === "ms") s.correct = [];
  if (qType === "tf") s.correct = "true";
  return s;
}

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i];
    a[i] = a[j];
    a[j] = tmp;
  }
  return a;
}

function getThemeColor(quiz) {
  var t = THEMES[quiz.theme] || THEMES["ocean"];
  return t.color;
}

/* ═══════════ HOME ═══════════ */

function renderHome() {
  var grid = document.getElementById("home-grid");
  var empty = document.getElementById("home-empty");
  grid.innerHTML = "";
  if (quizzes.length === 0) {
    empty.style.display = "flex";
    grid.style.display = "none";
    return;
  }
  empty.style.display = "none";
  grid.style.display = "grid";
  for (var i = 0; i < quizzes.length; i++) {
    (function(quiz, idx) {
      var div = document.createElement("div");
      div.className = "quiz-card";
      var tc = getThemeColor(quiz);
      div.innerHTML = "<div class=\"quiz-card-top\">" +
        "<div class=\"quiz-card-dot\" style=\"background:" + esc(tc) + "\"></div>" +
        "<div class=\"quiz-card-title\">" + esc(quiz.title) + "</div>" +
        "</div>" +
        "<div class=\"quiz-card-meta\">" + quiz.slides.length + " slide" + (quiz.slides.length !== 1 ? "s" : "") + " &middot; " + esc(TYPE_LABELS[quiz.slides.length > 0 ? quiz.slides[0].qType : "mc"] || "") + (quiz.slides.length > 1 ? " + more" : "") + "</div>" +
        "<div class=\"quiz-card-actions\">" +
        "<button class=\"btn btn-primary btn-sm qc-edit\">&#9998; Edit</button>" +
        "<button class=\"btn btn-success btn-sm qc-play\">&#9654; Play</button>" +
        "<button class=\"btn btn-danger btn-xs qc-del\" title=\"Delete\">&#128465;</button>" +
        "</div>";
      grid.appendChild(div);
      div.querySelector(".qc-edit").addEventListener("click", function() { openEditor(quiz.id); });
      div.querySelector(".qc-play").addEventListener("click", function() { openPlayer(quiz.id, "screen-home"); });
      div.querySelector(".qc-del").addEventListener("click", function() {
        if (confirm("Delete \"" + quiz.title + "\"?")) {
          quizzes.splice(idx, 1);
          saveToStorage();
          renderHome();
        }
      });
    })(quizzes[i], i);
  }
}

function createNewQuiz() {
  var q = makeQuiz();
  quizzes.push(q);
  saveToStorage();
  openEditor(q.id);
}

function importQZ2() {
  var inp = document.createElement("input");
  inp.type = "file";
  inp.accept = ".qz2,.json";
  inp.addEventListener("change", function() {
    if (!inp.files || !inp.files[0]) return;
    var reader = new FileReader();
    reader.addEventListener("load", function() {
      try {
        var data = JSON.parse(reader.result);
        if (data && data.id && data.slides) {
          data.id = uid();
          quizzes.push(data);
          saveToStorage();
          renderHome();
          showToast("Quiz imported!");
        } else {
          alert("Invalid quiz file.");
        }
      } catch(e) { alert("Could not parse file."); }
    });
    reader.readAsText(inp.files[0]);
  });
  inp.click();
}

/* ═══════════ EDITOR ═══════════ */

function openEditor(quizId) {
  for (var i = 0; i < quizzes.length; i++) {
    if (quizzes[i].id === quizId) {
      currentQuiz = quizzes[i];
      break;
    }
  }
  if (!currentQuiz) return;
  currentSlideIdx = -1;
  showScreen("screen-editor");
  document.getElementById("ed-quiz-title").textContent = currentQuiz.title;
  renderSlideList();
  renderEditorMain();
}

function renderSlideList() {
  var list = document.getElementById("slide-list");
  list.innerHTML = "";
  if (!currentQuiz) return;
  /* Settings item */
  var setItem = document.createElement("div");
  setItem.className = "slide-item" + (currentSlideIdx === -1 ? " active" : "");
  setItem.innerHTML = "<span class=\"si-num\">&#9881;</span><span class=\"si-preview\">Quiz Settings</span>";
  list.appendChild(setItem);
  setItem.addEventListener("click", function() {
    saveCurrentEditorState();
    currentSlideIdx = -1;
    renderSlideList();
    renderEditorMain();
  });
  for (var i = 0; i < currentQuiz.slides.length; i++) {
    (function(idx) {
      var s = currentQuiz.slides[idx];
      var div = document.createElement("div");
      div.className = "slide-item" + (currentSlideIdx === idx ? " active" : "");
      var badgeCls = "badge badge-" + s.qType;
      var preview = s.question ? s.question.substring(0, 28) : "(no question)";
      div.innerHTML = "<span class=\"si-num\">" + (idx + 1) + "</span>" +
        "<span class=\"" + badgeCls + "\">" + esc(BADGE_MAP[s.qType] || s.qType) + "</span>" +
        "<span class=\"si-preview\">" + esc(preview) + "</span>";
      list.appendChild(div);
      div.addEventListener("click", function() {
        saveCurrentEditorState();
        currentSlideIdx = idx;
        renderSlideList();
        renderEditorMain();
      });
    })(i);
  }
}

function renderEditorMain() {
  var main = document.getElementById("ed-main");
  main.innerHTML = "";
  if (!currentQuiz) return;
  if (currentSlideIdx === -1) {
    renderSettingsPanel(main);
  } else {
    renderSlideEditor(main, currentQuiz.slides[currentSlideIdx]);
  }
}

function saveCurrentEditorState() {
  if (!currentQuiz) return;
  if (currentSlideIdx === -1) {
    var titleEl = document.getElementById("set-title");
    if (titleEl) currentQuiz.title = titleEl.value;
    var passEl = document.getElementById("set-pass");
    if (passEl) currentQuiz.passScore = parseInt(passEl.value) || 70;
    var fontEl = document.getElementById("set-font");
    if (fontEl) currentQuiz.fontFamily = fontEl.value;
    var btnEl = document.getElementById("set-btn-style");
    if (btnEl) currentQuiz.btnStyle = btnEl.value;
    var pmEl = document.getElementById("set-pass-msg");
    if (pmEl) currentQuiz.passingMessage = pmEl.value;
    var fmEl = document.getElementById("set-fail-msg");
    if (fmEl) currentQuiz.failingMessage = fmEl.value;
  }
  /* Slide fields are saved live via addEventListener("input"...) so no additional reading needed here */
}

function addSlide(qType) {
  if (!currentQuiz) return;
  saveCurrentEditorState();
  var s = makeSlide(qType);
  currentQuiz.slides.push(s);
  currentSlideIdx = currentQuiz.slides.length - 1;
  saveToStorage();
  renderSlideList();
  renderEditorMain();
}

function deleteCurrentSlide() {
  if (!currentQuiz || currentSlideIdx < 0) return;
  currentQuiz.slides.splice(currentSlideIdx, 1);
  currentSlideIdx = Math.min(currentSlideIdx, currentQuiz.slides.length - 1);
  if (currentQuiz.slides.length === 0) currentSlideIdx = -1;
  saveToStorage();
  renderSlideList();
  renderEditorMain();
}

function moveSlide(dir) {
  if (!currentQuiz || currentSlideIdx < 0) return;
  var newIdx = currentSlideIdx + dir;
  if (newIdx < 0 || newIdx >= currentQuiz.slides.length) return;
  var tmp = currentQuiz.slides[currentSlideIdx];
  currentQuiz.slides[currentSlideIdx] = currentQuiz.slides[newIdx];
  currentQuiz.slides[newIdx] = tmp;
  currentSlideIdx = newIdx;
  saveToStorage();
  renderSlideList();
}

/* ═══════════ PLAYER ═══════════ */

function openPlayer(quizId, returnScreen) {
  var quiz = null;
  for (var i = 0; i < quizzes.length; i++) {
    if (quizzes[i].id === quizId) { quiz = quizzes[i]; break; }
  }
  if (!quiz) return;
  playerQuiz = JSON.parse(JSON.stringify(quiz));
  if (playerQuiz.shuffle) playerQuiz.slides = shuffleArray(playerQuiz.slides);
  playerSlideIdx = 0;
  playerAnswers = {};
  playerGraded = {};
  playerOrdOrders = {};
  playerMcOrders = {};
  playerReturnScreen = returnScreen;
  showScreen("screen-player");
  document.getElementById("pl-title").textContent = playerQuiz.title;
  document.getElementById("screen-player").style.fontFamily = playerQuiz.fontFamily;
  var th = THEMES[playerQuiz.theme] || THEMES["ocean"];
  document.querySelector(".player-body-wrap").style.background = "linear-gradient(135deg, " + th.g1 + ", " + th.g2 + ")";
  renderPlayerSlide();
}

function getBtnRadius(style) {
  if (style === "pill") return "999px";
  if (style === "square") return "4px";
  return "12px";
}

function renderPlayerSlide() {
  var body = document.getElementById("pl-body");
  if (!playerQuiz || playerQuiz.slides.length === 0) {
    body.innerHTML = "<div style=\"text-align:center;padding:60px 0;color:#94a3b8;\">This quiz has no slides.</div>";
    return;
  }
  var slide = playerQuiz.slides[playerSlideIdx];
  var total = playerQuiz.slides.length;
  var pct = Math.round(((playerSlideIdx) / total) * 100);
  var themeColor = (THEMES[playerQuiz.theme] || THEMES["ocean"]).color;
  var btnRad = getBtnRadius(playerQuiz.btnStyle);
  var graded = playerGraded[slide.id];
  var answer = playerAnswers[slide.id];

  var html = "<div class=\"progress-bar-track\"><div class=\"progress-bar-fill\" style=\"width:" + pct + "%;background:" + themeColor + ";\"></div></div>";
  html += "<div style=\"font-size:13px;color:#94a3b8;margin-bottom:4px;\">Question " + (playerSlideIdx + 1) + " of " + total + "</div>";
  html += "<div class=\"player-q-text\">" + esc(slide.question || "(No question text)") + "</div>";

  if (slide.qType === "mc") {
    var opts = slide.options;
    var order = [];
    if (playerQuiz.shuffleAnswers) {
      if (!playerMcOrders[slide.id]) {
        var indices = [];
        for (var i = 0; i < opts.length; i++) indices.push(i);
        playerMcOrders[slide.id] = shuffleArray(indices);
      }
      order = playerMcOrders[slide.id];
    } else {
      for (var i = 0; i < opts.length; i++) order.push(i);
    }
    var letters = ["A","B","C","D","E","F","G","H"];
    for (var oi = 0; oi < order.length; oi++) {
      var idx = order[oi];
      if (!opts[idx] && opts[idx] !== 0) continue;
      var selected = answer === idx;
      var cls = "opt-card";
      if (selected) cls += " selected";
      if (graded && selected && graded === "correct") cls += " correct-highlight";
      if (graded && selected && graded === "incorrect") cls += " incorrect-highlight";
      if (graded && idx === slide.correct && !selected) cls += " correct-highlight";
      html += "<div class=\"" + cls + "\" data-opt-idx=\"" + idx + "\"><div class=\"opt-letter\">" + letters[oi] + "</div><div>" + esc(opts[idx]) + "</div></div>";
    }
  } else if (slide.qType === "ms") {
    var opts = slide.options;
    var order = [];
    if (playerQuiz.shuffleAnswers) {
      if (!playerMcOrders[slide.id]) {
        var indices = [];
        for (var i = 0; i < opts.length; i++) indices.push(i);
        playerMcOrders[slide.id] = shuffleArray(indices);
      }
      order = playerMcOrders[slide.id];
    } else {
      for (var i = 0; i < opts.length; i++) order.push(i);
    }
    if (!answer) playerAnswers[slide.id] = [];
    answer = playerAnswers[slide.id];
    var letters = ["A","B","C","D","E","F","G","H"];
    for (var oi = 0; oi < order.length; oi++) {
      var idx = order[oi];
      if (!opts[idx] && opts[idx] !== 0) continue;
      var selected = answer.indexOf(idx) !== -1;
      var cls = "opt-card";
      if (selected) cls += " selected";
      html += "<div class=\"" + cls + "\" data-opt-idx=\"" + idx + "\"><div class=\"opt-letter\">" + (selected ? "&#10003;" : letters[oi]) + "</div><div>" + esc(opts[idx]) + "</div></div>";
    }
  } else if (slide.qType === "tf") {
    var tfOpts = ["true","false"];
    var tfLabels = ["True","False"];
    for (var ti = 0; ti < 2; ti++) {
      var selected = answer === tfOpts[ti];
      var cls = "opt-card";
      if (selected) cls += " selected";
      if (graded && selected && graded === "correct") cls += " correct-highlight";
      if (graded && selected && graded === "incorrect") cls += " incorrect-highlight";
      if (graded && slide.correct === tfOpts[ti] && !selected) cls += " correct-highlight";
      html += "<div class=\"" + cls + "\" data-tf-val=\"" + tfOpts[ti] + "\"><div class=\"opt-letter\">" + tfLabels[ti].charAt(0) + "</div><div>" + tfLabels[ti] + "</div></div>";
    }
  } else if (slide.qType === "sa") {
    html += "<input type=\"text\" id=\"sa-player-input\" placeholder=\"Type your answer...\" value=\"" + esc(answer || "") + "\" style=\"font-size:16px;padding:14px 18px;border-radius:" + btnRad + ";\">";
  } else if (slide.qType === "mat") {
    if (!answer) { playerAnswers[slide.id] = {}; answer = playerAnswers[slide.id]; }
    var rightOpts = [];
    for (var pi = 0; pi < slide.pairs.length; pi++) rightOpts.push(slide.pairs[pi].r);
    var shuffledRight = shuffleArray(rightOpts);
    for (var pi = 0; pi < slide.pairs.length; pi++) {
      html += "<div class=\"mat-row\"><div class=\"mat-left\">" + esc(slide.pairs[pi].l) + "</div><span class=\"mat-arrow\">&rarr;</span><select class=\"mat-sel\" data-pidx=\"" + pi + "\" style=\"border-radius:" + btnRad + ";\">";
      html += "<option value=\"\">Select...</option>";
      for (var ri = 0; ri < shuffledRight.length; ri++) {
        var sel = (answer[pi] === shuffledRight[ri]) ? " selected" : "";
        html += "<option value=\"" + esc(shuffledRight[ri]) + "\"" + sel + ">" + esc(shuffledRight[ri]) + "</option>";
      }
      html += "</select></div>";
    }
  } else if (slide.qType === "ord") {
    var validItems = slide.items.filter(function(x) { return x !== ""; });
    if (!playerOrdOrders[slide.id]) {
      playerOrdOrders[slide.id] = shuffleArray(validItems);
    }
    var ordItems = playerOrdOrders[slide.id];
    for (var oi = 0; oi < ordItems.length; oi++) {
      html += "<div class=\"ord-item\"><span class=\"ord-num\">" + (oi+1) + "</span><span class=\"ord-text\">" + esc(ordItems[oi]) + "</span><span class=\"ord-btns\"><button class=\"btn btn-secondary btn-xs ord-up\" data-oidx=\"" + oi + "\">&#9650;</button><button class=\"btn btn-secondary btn-xs ord-dn\" data-oidx=\"" + oi + "\">&#9660;</button></span></div>";
    }
  }

  /* Feedback */
  if (graded && playerQuiz.feedbackMode === "immediate") {
    if (graded === "correct") {
      html += "<div class=\"feedback-box feedback-correct\">&#10003; " + esc(slide.correctFeedback || "Correct!") + "</div>";
    } else {
      html += "<div class=\"feedback-box feedback-incorrect\">&#10007; " + esc(slide.incorrectFeedback || "Incorrect.") + "</div>";
    }
  }

  /* Nav buttons */
  html += "<div class=\"player-nav-btns\">";
  if (playerSlideIdx > 0) {
    html += "<button class=\"btn btn-secondary\" id=\"pl-prev\" style=\"border-radius:" + btnRad + ";\">&#8592; Previous</button>";
  }
  if (playerSlideIdx < total - 1) {
    html += "<button class=\"btn btn-primary\" id=\"pl-next\" style=\"border-radius:" + btnRad + ";background:" + themeColor + ";\">Next &#8594;</button>";
  } else {
    html += "<button class=\"btn btn-success\" id=\"pl-submit\" style=\"border-radius:" + btnRad + ";\">Submit Quiz</button>";
  }
  html += "</div>";

  body.innerHTML = html;

  /* Wire interactions */
  if (slide.qType === "mc") {
    var optCards = body.querySelectorAll(".opt-card[data-opt-idx]");
    for (var c = 0; c < optCards.length; c++) {
      optCards[c].addEventListener("click", function() {
        if (graded) return;
        var idx = parseInt(this.getAttribute("data-opt-idx"));
        playerAnswers[slide.id] = idx;
        if (playerQuiz.feedbackMode === "immediate") {
          var isCorrect = gradeSlide(slide);
          playerGraded[slide.id] = isCorrect ? "correct" : "incorrect";
        }
        renderPlayerSlide();
      });
    }
  } else if (slide.qType === "ms") {
    var optCards = body.querySelectorAll(".opt-card[data-opt-idx]");
    for (var c = 0; c < optCards.length; c++) {
      optCards[c].addEventListener("click", function() {
        if (graded) return;
        var idx = parseInt(this.getAttribute("data-opt-idx"));
        if (!Array.isArray(playerAnswers[slide.id])) playerAnswers[slide.id] = [];
        var pos = playerAnswers[slide.id].indexOf(idx);
        if (pos === -1) { playerAnswers[slide.id].push(idx); } else { playerAnswers[slide.id].splice(pos, 1); }
        renderPlayerSlide();
      });
    }
  } else if (slide.qType === "tf") {
    var tfCards = body.querySelectorAll(".opt-card[data-tf-val]");
    for (var t = 0; t < tfCards.length; t++) {
      tfCards[t].addEventListener("click", function() {
        if (graded) return;
        playerAnswers[slide.id] = this.getAttribute("data-tf-val");
        if (playerQuiz.feedbackMode === "immediate") {
          var isCorrect = gradeSlide(slide);
          playerGraded[slide.id] = isCorrect ? "correct" : "incorrect";
        }
        renderPlayerSlide();
      });
    }
  } else if (slide.qType === "sa") {
    var saInput = document.getElementById("sa-player-input");
    if (saInput) {
      saInput.addEventListener("input", function() { playerAnswers[slide.id] = this.value; });
    }
  } else if (slide.qType === "mat") {
    var matSels = body.querySelectorAll(".mat-sel");
    for (var ms = 0; ms < matSels.length; ms++) {
      (function(el) {
        el.addEventListener("change", function() {
          var pidx = parseInt(el.getAttribute("data-pidx"));
          if (!playerAnswers[slide.id]) playerAnswers[slide.id] = {};
          playerAnswers[slide.id][pidx] = el.value;
        });
      })(matSels[ms]);
    }
  } else if (slide.qType === "ord") {
    var ordUps = body.querySelectorAll(".ord-up");
    for (var ou = 0; ou < ordUps.length; ou++) {
      ordUps[ou].addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-oidx"));
        if (idx === 0) return;
        var arr = playerOrdOrders[slide.id];
        var tmp = arr[idx];
        arr[idx] = arr[idx - 1];
        arr[idx - 1] = tmp;
        renderPlayerSlide();
      });
    }
    var ordDns = body.querySelectorAll(".ord-dn");
    for (var od = 0; od < ordDns.length; od++) {
      ordDns[od].addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-oidx"));
        var arr = playerOrdOrders[slide.id];
        if (idx === arr.length - 1) return;
        var tmp = arr[idx];
        arr[idx] = arr[idx + 1];
        arr[idx + 1] = tmp;
        renderPlayerSlide();
      });
    }
  }

  /* Nav buttons */
  var prevBtn = document.getElementById("pl-prev");
  if (prevBtn) prevBtn.addEventListener("click", function() { playerSlideIdx--; renderPlayerSlide(); });
  var nextBtn = document.getElementById("pl-next");
  if (nextBtn) nextBtn.addEventListener("click", function() { playerSlideIdx++; renderPlayerSlide(); });
  var submitBtn = document.getElementById("pl-submit");
  if (submitBtn) submitBtn.addEventListener("click", function() { renderResults(); });
}

function gradeSlide(slide) {
  var answer = playerAnswers[slide.id];
  if (slide.qType === "mc") {
    return answer === slide.correct;
  } else if (slide.qType === "ms") {
    var correctArr = Array.isArray(slide.correct) ? slide.correct.slice().sort() : [];
    var ansArr = Array.isArray(answer) ? answer.slice().sort() : [];
    return JSON.stringify(correctArr) === JSON.stringify(ansArr);
  } else if (slide.qType === "tf") {
    return answer === slide.correct;
  } else if (slide.qType === "sa") {
    if (!answer) return false;
    var trimmed = answer.trim().toLowerCase();
    for (var i = 0; i < slide.acceptedAnswers.length; i++) {
      if (slide.acceptedAnswers[i].trim().toLowerCase() === trimmed) return true;
    }
    return false;
  } else if (slide.qType === "mat") {
    if (!answer) return false;
    for (var i = 0; i < slide.pairs.length; i++) {
      if (answer[i] !== slide.pairs[i].r) return false;
    }
    return true;
  } else if (slide.qType === "ord") {
    var validItems = slide.items.filter(function(x) { return x !== ""; });
    var ordArr = playerOrdOrders[slide.id] || [];
    return JSON.stringify(ordArr) === JSON.stringify(validItems);
  }
  return false;
}

function renderResults() {
  var body = document.getElementById("pl-body");
  var total = playerQuiz.slides.length;
  var correct = 0;
  for (var i = 0; i < total; i++) {
    var s = playerQuiz.slides[i];
    var isCorrect = gradeSlide(s);
    playerGraded[s.id] = isCorrect ? "correct" : "incorrect";
    if (isCorrect) correct++;
  }
  var pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  var passed = pct >= playerQuiz.passScore;
  var themeColor = (THEMES[playerQuiz.theme] || THEMES["ocean"]).color;
  var btnRad = getBtnRadius(playerQuiz.btnStyle);

  var html = "<div class=\"results-wrap\">";
  if (playerQuiz.showScore) {
    html += "<div style=\"font-size:14px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;\">Your Score</div>";
    html += "<div class=\"results-score\" style=\"color:" + (passed ? "#22c55e" : "#ef4444") + ";\">" + pct + "%</div>";
    html += "<div style=\"font-size:15px;color:#94a3b8;margin-bottom:8px;\">" + correct + " of " + total + " correct</div>";
  }
  html += "<div class=\"results-msg\" style=\"color:" + (passed ? "#22c55e" : "#ef4444") + ";\">" + esc(passed ? playerQuiz.passingMessage : playerQuiz.failingMessage) + "</div>";
  html += "<button class=\"btn btn-primary\" id=\"pl-retake\" style=\"border-radius:" + btnRad + ";background:" + themeColor + ";font-size:15px;padding:12px 28px;\">&#8635; Retake Quiz</button>";
  html += "</div>";

  if (playerQuiz.showReview && playerQuiz.feedbackMode !== "none") {
    html += "<div style=\"margin-top:30px;\">";
    html += "<h3 style=\"font-size:16px;font-weight:700;margin-bottom:14px;\">Review</h3>";
    for (var i = 0; i < total; i++) {
      var s = playerQuiz.slides[i];
      var isCorr = playerGraded[s.id] === "correct";
      html += "<div class=\"review-item\"><div class=\"review-q\">" + (isCorr ? "<span style=\"color:#22c55e;\">&#10003;</span>" : "<span style=\"color:#ef4444;\">&#10007;</span>") + " Q" + (i+1) + ": " + esc(s.question) + "</div>";
      html += "<div class=\"review-detail\">";
      if (s.qType === "mc" || s.qType === "ms") {
        var corr = Array.isArray(s.correct) ? s.correct : [s.correct];
        var corrTexts = [];
        for (var ci = 0; ci < corr.length; ci++) {
          if (s.options[corr[ci]]) corrTexts.push(s.options[corr[ci]]);
        }
        html += "Correct: " + esc(corrTexts.join(", "));
      } else if (s.qType === "tf") {
        html += "Correct: " + (s.correct === "true" ? "True" : "False");
      } else if (s.qType === "sa") {
        html += "Accepted: " + esc(s.acceptedAnswers.join(", "));
      } else if (s.qType === "mat") {
        var pairTexts = [];
        for (var pi = 0; pi < s.pairs.length; pi++) pairTexts.push(s.pairs[pi].l + " &rarr; " + s.pairs[pi].r);
        html += "Correct pairs: " + pairTexts.join("; ");
      } else if (s.qType === "ord") {
        html += "Correct order: " + esc(s.items.filter(function(x){return x!=="";}).join(" &rarr; "));
      }
      if (isCorr && s.correctFeedback) html += "<br>" + esc(s.correctFeedback);
      if (!isCorr && s.incorrectFeedback) html += "<br>" + esc(s.incorrectFeedback);
      html += "</div></div>";
    }
    html += "</div>";
  }

  body.innerHTML = html;
  document.getElementById("pl-retake").addEventListener("click", function() {
    openPlayer(playerQuiz.id, playerReturnScreen);
  });
}

function saveQuizFile(quiz) {
  var json = JSON.stringify(quiz, null, 2);
  downloadBlob(json, quiz.title + ".qz2", "application/json");
  showToast("Quiz file saved!");
}

  h += "else if(s.qType===\"ord\"){var vi=s.items.filter(function(x){return x!==\"\";});if(!ordO[s.id])ordO[s.id]=shuffle(vi);var oi=ordO[s.id];for(var i=0;i<oi.length;i++){h+=\"<div class='ord-item'><span class='ord-num'>\"+(i+1)+\"</span><span class='ord-text'>\"+esc(oi[i])+\"</span><span class='ord-btns'><button class='btn btn-s ord-u' data-oi='\"+i+\"' style='padding:4px 8px;font-size:11px;'>&#9650;</button><button class='btn btn-s ord-d' data-oi='\"+i+\"' style='padding:4px 8px;font-size:11px;'>&#9660;</button></span></div>\";}}";
  h += "if(g&&quiz.feedbackMode===\"immediate\"){if(g===\"correct\")h+=\"<div class='fb fb-c'>&#10003; \"+esc(s.correctFeedback||\"Correct!\")+\"</div>\";else h+=\"<div class='fb fb-i'>&#10007; \"+esc(s.incorrectFeedback||\"Incorrect.\")+\"</div>\";}";
  h += "h+=\"<div class='nav-btns'>\";if(si>0)h+=\"<button class='btn btn-s' id='prev'>&#8592; Previous</button>\";if(si<t-1)h+=\"<button class='btn btn-p' id='next'>Next &#8594;</button>\";else h+=\"<button class='btn btn-g' id='sub'>Submit Quiz</button>\";h+=\"</div>\";";
  h += "app.innerHTML=h;";
  h += "if(s.qType===\"mc\"){var oc=app.querySelectorAll(\".opt[data-i]\");for(var i=0;i<oc.length;i++){oc[i].addEventListener(\"click\",function(){if(g)return;var idx=parseInt(this.getAttribute(\"data-i\"));ans[s.id]=idx;if(quiz.feedbackMode===\"immediate\"){graded[s.id]=grade(s)?\"correct\":\"incorrect\";}render();});}}";
  h += "if(s.qType===\"ms\"){var oc=app.querySelectorAll(\".opt[data-mi]\");for(var i=0;i<oc.length;i++){oc[i].addEventListener(\"click\",function(){var idx=parseInt(this.getAttribute(\"data-mi\"));if(!Array.isArray(ans[s.id]))ans[s.id]=[];var p2=ans[s.id].indexOf(idx);if(p2===-1)ans[s.id].push(idx);else ans[s.id].splice(p2,1);render();});}}";
  h += "if(s.qType===\"tf\"){var tc=app.querySelectorAll(\".opt[data-tf]\");for(var i=0;i<tc.length;i++){tc[i].addEventListener(\"click\",function(){if(g)return;ans[s.id]=this.getAttribute(\"data-tf\");if(quiz.feedbackMode===\"immediate\"){graded[s.id]=grade(s)?\"correct\":\"incorrect\";}render();});}}";
  h += "if(s.qType===\"sa\"){var inp=document.getElementById(\"sa-in\");if(inp)inp.addEventListener(\"input\",function(){ans[s.id]=this.value;});}";
  h += "if(s.qType===\"mat\"){var ms2=app.querySelectorAll(\".mat-sel\");for(var i=0;i<ms2.length;i++){(function(el){el.addEventListener(\"change\",function(){var pi=parseInt(el.getAttribute(\"data-pi\"));if(!ans[s.id])ans[s.id]={};ans[s.id][pi]=el.value;});})(ms2[i]);}}";
  h += "if(s.qType===\"ord\"){var ou=app.querySelectorAll(\".ord-u\");for(var i=0;i<ou.length;i++){ou[i].addEventListener(\"click\",function(){var idx=parseInt(this.getAttribute(\"data-oi\"));if(idx===0)return;var arr=ordO[s.id];var tmp=arr[idx];arr[idx]=arr[idx-1];arr[idx-1]=tmp;render();});}var od=app.querySelectorAll(\".ord-d\");for(var i=0;i<od.length;i++){od[i].addEventListener(\"click\",function(){var idx=parseInt(this.getAttribute(\"data-oi\"));var arr=ordO[s.id];if(idx===arr.length-1)return;var tmp=arr[idx];arr[idx]=arr[idx+1];arr[idx+1]=tmp;render();});}}";
  h += "var pb=document.getElementById(\"prev\");if(pb)pb.addEventListener(\"click\",function(){si--;render();});var nb=document.getElementById(\"next\");if(nb)nb.addEventListener(\"click\",function(){si++;render();});var sb=document.getElementById(\"sub\");if(sb)sb.addEventListener(\"click\",function(){showResults();});}";
  h += "function showResults(){var app=document.getElementById(\"app\");var t=quiz.slides.length;var c=0;for(var i=0;i<t;i++){var s2=quiz.slides[i];if(grade(s2)){c++;graded[s2.id]=\"correct\";}else{graded[s2.id]=\"incorrect\";}}var pct=t>0?Math.round((c/t)*100):0;var passed=pct>=quiz.passScore;var h2=\"<div class='results'>\";if(quiz.showScore){h2+=\"<div style='font-size:14px;color:#94a3b8;text-transform:uppercase;'>Your Score</div>\";h2+=\"<div class='score' style='color:\"+(passed?\"#22c55e\":\"#ef4444\")+\";'>\"+pct+\"%</div>\";h2+=\"<div style='font-size:15px;color:#94a3b8;'>\"+c+\" of \"+t+\" correct</div>\";}";
  h += "h2+=\"<div class='msg' style='color:\"+(passed?\"#22c55e\":\"#ef4444\")+\";'>\"+esc(passed?quiz.passingMessage:quiz.failingMessage)+\"</div>\";h2+=\"<button class='btn btn-p' id='retake'>&#8635; Retake</button></div>\";";
  h += "if(quiz.showReview&&quiz.feedbackMode!==\"none\"){h2+=\"<div style='margin-top:30px;'><h3 style='font-size:16px;font-weight:700;margin-bottom:14px;'>Review</h3>\";for(var i=0;i<t;i++){var s3=quiz.slides[i];var ic=graded[s3.id]===\"correct\";h2+=\"<div class='review-item'><div class='review-q'>\"+(ic?\"<span style='color:#22c55e;'>&#10003;</span>\":\"<span style='color:#ef4444;'>&#10007;</span>\")+\" Q\"+(i+1)+\": \"+esc(s3.question)+\"</div><div class='review-d'>\";if(s3.qType===\"mc\")h2+=\"Correct: \"+esc(s3.options[s3.correct]||\"\");else if(s3.qType===\"tf\")h2+=\"Correct: \"+(s3.correct===\"true\"?\"True\":\"False\");else if(s3.qType===\"sa\")h2+=\"Accepted: \"+esc(s3.acceptedAnswers.join(\", \"));h2+=\"</div></div>\";}h2+=\"</div>\";}";
  h += "app.innerHTML=h2;document.getElementById(\"retake\").addEventListener(\"click\",function(){si=0;ans={};graded={};ordO={};mcO={};render();});}";
  h += "if(quiz.shuffle)quiz.slides=shuffle(quiz.slides.slice());render();";
  h += "<" + "/script></body></html>";
  downloadBlob(h, (quiz.title||"quiz").replace(/[^a-z0-9]/gi,"_")+".html","text/html");
}

function exportSCORM(quiz) {
  var t = quiz.title || "Quiz";
  var m = "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n";
  m += "<manifest identifier=\"quiz_scorm\" version=\"1.2\">\n";
  m += "<organizations default=\"o\"><organization identifier=\"o\">";
  m += "<title>" + t + "</title>";
  m += "<item identifier=\"i1\" identifierref=\"r1\"><title>" + t + "</title></item>";
  m += "</organization></organizations>\n";
  m += "<resources><resource identifier=\"r1\" type=\"webcontent\" href=\"index.html\">";
  m += "<file href=\"index.html\"/></resource></resources>\n";
  m += "</manifest>";
  downloadBlob(m, "imsmanifest.xml", "application/xml");
  setTimeout(function() { exportWebHTML(quiz); }, 500);
  alert("SCORM export: rename the downloaded HTML to index.html and zip it with imsmanifest.xml for your LMS.");
}

function wireButtons() {
  function on(id, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("click", fn);
  }
  on("btn-new-quiz", createNewQuiz);
  on("btn-import-qz2", importQZ2);
  on("btn-back-home", function() {
    saveCurrentEditorState();
    saveToStorage();
    showScreen("screen-home");
    renderHome();
  });
  on("btn-preview", function() {
    saveCurrentEditorState();
    saveToStorage();
    if (currentQuiz) openPlayer(currentQuiz.id, "screen-editor");
  });
  on("btn-save-quiz", function() {
    saveCurrentEditorState();
    saveToStorage();
    showToast("Saved!");
    var el = document.getElementById("ed-quiz-title");
    if (el) el.textContent = currentQuiz.title;
  });
  on("btn-add-mc",  function() { addSlide("mc");  });
  on("btn-add-ms",  function() { addSlide("ms");  });
  on("btn-add-tf",  function() { addSlide("tf");  });
  on("btn-add-sa",  function() { addSlide("sa");  });
  on("btn-add-mat", function() { addSlide("mat"); });
  on("btn-add-ord", function() { addSlide("ord"); });
  on("btn-slide-up",  function() { moveSlide(-1); });
  on("btn-slide-dn",  function() { moveSlide(1);  });
  on("btn-slide-del", deleteCurrentSlide);
  on("btn-exit-player", function() {
    showScreen(playerReturnScreen);
    if (playerReturnScreen === "screen-home") renderHome();
  });
}

function init() {
  loadFromStorage();
  renderHome();
  wireButtons();
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
