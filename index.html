<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizmaker 2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0f172a;color:#f1f5f9;overflow:hidden;height:100vh;}
input,textarea,select,button{font-family:inherit;outline:none;}
.screen{display:none;width:100%;height:100vh;}
.screen.active{display:flex;}
::-webkit-scrollbar{width:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#475569;}
.btn-primary{background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;}
.btn-primary:hover{background:#1d4ed8;}
.btn-outline{background:transparent;color:#2563eb;border:2px solid #2563eb;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-outline:hover{background:#2563eb;color:#fff;}
.btn-ghost{background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:600;padding:6px 10px;border-radius:6px;transition:background 0.1s;}
.btn-ghost:hover{background:#1e293b;color:#e2e8f0;}
.toggle{width:36px;height:20px;border-radius:10px;background:#334155;cursor:pointer;position:relative;transition:background 0.2s;display:inline-block;vertical-align:middle;flex-shrink:0;}
.toggle.on{background:#2563eb;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s;}
.toggle.on::after{left:18px;}
.slide-item{display:flex;align-items:center;gap:6px;padding:9px 10px;border-left:3px solid transparent;cursor:pointer;border-bottom:1px solid #334155;transition:background 0.1s;position:relative;}
.slide-item.active{border-left-color:#6366f1;background:#1e3a5f;}
.slide-item:hover{background:#273448;}
.slide-actions{display:none;gap:2px;position:absolute;right:4px;top:50%;transform:translateY(-50%);}
.slide-item:hover .slide-actions{display:flex;}
.type-badge{display:inline-block;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.rp-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;margin-top:14px;}
.rp-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;background:#fff;color:#0f172a;}
.rp-input:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.15);}
.rp-textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;background:#fff;color:#0f172a;resize:vertical;min-height:60px;}
.rp-textarea:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.15);}
.tab-btn-rp{padding:7px 14px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:#f1f5f9;color:#64748b;border-radius:6px;transition:all 0.15s;}
.tab-btn-rp.active{background:#2563eb;color:#fff;}
.swatch{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.swatch.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.3);}
.swatch:hover{transform:scale(1.1);}
.action-btn-sm{background:none;border:none;color:#64748b;cursor:pointer;padding:2px 3px;border-radius:4px;font-size:12px;line-height:1;}
.action-btn-sm:hover{background:#334155;color:#e2e8f0;}
.action-btn-sm:disabled,.action-btn-sm[disabled]{opacity:0.3;pointer-events:none;}
.option-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.option-row input[type="text"]{flex:1;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;}
.option-row input[type="text"]:focus{border-color:#2563eb;}
.option-row input[type="radio"],.option-row input[type="checkbox"]{cursor:pointer;width:16px;height:16px;accent-color:#2563eb;}
.wiz-step{display:none;flex-direction:column;align-items:center;gap:16px;width:100%;}
.wiz-step.active{display:flex;}
.grad-swatch{width:44px;height:44px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.grad-swatch.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.5);}
.grad-swatch:hover{transform:scale(1.08);}
.stepper{display:flex;align-items:center;gap:8px;background:#f8fafc;padding:8px 12px;border-radius:10px;margin-bottom:6px;}
.stepper-label{flex:1;font-size:13px;font-weight:600;color:#334155;}
.stepper button{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.stepper-val{width:28px;text-align:center;font-size:14px;font-weight:700;color:#0f172a;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease;}
.quiz-card-home{background:#1e293b;border-radius:14px;padding:16px;cursor:pointer;transition:all 0.15s;border:1px solid #334155;position:relative;}
.quiz-card-home:hover{background:#273448;border-color:#475569;transform:translateY(-2px);}
.new-badge{position:absolute;top:8px;right:8px;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;}
</style>
</head>
<body data-id="0">
<app-icon data-id="1" hidden data-icon="circle-help" data-palette="Blue"></app-icon>

<!-- HOME SCREEN -->
<div data-id="2" id="screen-home" class="screen active" style="flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:40px 20px;">
  <div data-id="3" id="home-content" class="fade-in" style="width:100%;max-width:480px;margin:0 auto;"></div>
  <div data-id="4" id="home-grid" style="width:100%;max-width:720px;margin:32px auto 0;"></div>
  <footer data-id="5" style="margin-top:auto;padding:24px 0 12px;text-align:center;"><p data-id="6" style="font-size:11px;color:#475569;">Made by Copilot</p></footer>
</div>

<!-- WIZARD SCREEN -->
<div data-id="7" id="screen-wizard" class="screen" style="flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:40px 20px;">
  <div data-id="8" id="wizard-card" class="fade-in" style="background:#fff;border-radius:20px;padding:32px;max-width:520px;width:100%;color:#0f172a;box-shadow:0 25px 60px rgba(0,0,0,0.3);"></div>
</div>

<!-- EDITOR SCREEN -->
<div data-id="9" id="screen-editor" class="screen" style="flex-direction:row;height:100vh;">
  <div data-id="10" id="editor-sidebar" style="width:220px;min-width:220px;background:#1e293b;display:flex;flex-direction:column;height:100vh;border-right:1px solid #334155;"></div>
  <div data-id="11" id="editor-canvas" style="flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px;"></div>
  <div data-id="12" id="editor-rpanel" style="width:280px;min-width:280px;background:#fff;color:#0f172a;overflow-y:auto;height:100vh;border-left:1px solid #e2e8f0;"></div>
</div>

<!-- PREVIEW SCREEN -->
<div data-id="13" id="screen-preview" class="screen" style="flex-direction:column;height:100vh;"></div>

<script>
// =================== CONSTANTS ===================
var THEMES=[
{id:'ocean',name:'Ocean Blue',bg:'#f0f7ff',card:'#ffffff',primary:'#2563eb',text:'#1e293b',muted:'#64748b',border:'#bfdbfe'},
{id:'forest',name:'Forest Green',bg:'#f0fdf4',card:'#ffffff',primary:'#16a34a',text:'#14532d',muted:'#4b7c59',border:'#bbf7d0'},
{id:'sunset',name:'Sunset',bg:'#fff7ed',card:'#ffffff',primary:'#ea580c',text:'#431407',muted:'#9a3412',border:'#fed7aa'},
{id:'purple',name:'Purple',bg:'#f5f3ff',card:'#ffffff',primary:'#7c3aed',text:'#2e1065',muted:'#6d28d9',border:'#ddd6fe'},
{id:'rose',name:'Rose',bg:'#fff1f2',card:'#ffffff',primary:'#e11d48',text:'#4c0519',muted:'#9f1239',border:'#fecdd3'},
{id:'teal',name:'Teal',bg:'#f0fdf9',card:'#ffffff',primary:'#0d9488',text:'#042f2e',muted:'#0f766e',border:'#99f6e4'},
{id:'slate',name:'Slate',bg:'#f8fafc',card:'#ffffff',primary:'#475569',text:'#0f172a',muted:'#64748b',border:'#e2e8f0'},
{id:'amber',name:'Amber',bg:'#fffbeb',card:'#ffffff',primary:'#d97706',text:'#451a03',muted:'#92400e',border:'#fde68a'},
{id:'midnight',name:'Midnight',bg:'#0a0f1e',card:'#1a2035',primary:'#60a5fa',text:'#e2e8f0',muted:'#94a3b8',border:'#1e3a5f'},
{id:'dark',name:'Dark Slate',bg:'#0f172a',card:'#1e293b',primary:'#38bdf8',text:'#f1f5f9',muted:'#94a3b8',border:'#334155'},
{id:'galaxy',name:'Galaxy',bg:'#12001e',card:'#1e0a35',primary:'#a78bfa',text:'#ede9fe',muted:'#7c3aed',border:'#4c1d95'},
{id:'obsidian',name:'Obsidian',bg:'#060606',card:'#111111',primary:'#f59e0b',text:'#ffffff',muted:'#9ca3af',border:'#1f2937'}
];
var FONTS=['Arial','Georgia','Verdana','Courier New','Helvetica','Tahoma','Times New Roman','Trebuchet MS','Palatino','Impact','Comic Sans MS'];
var BG_GRADIENTS=[
'linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)',
'linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)',
'linear-gradient(135deg,#fd7043,#ffb74d)','linear-gradient(135deg,#00c6ff,#0072ff)','linear-gradient(135deg,#11998e,#38ef7d)',
'linear-gradient(135deg,#ee0979,#ff6a00)','linear-gradient(135deg,#373b44,#4286f4)','linear-gradient(135deg,#f7971e,#ffd200)'
];
var TYPE_COLORS={mc:'#3b82f6',tf:'#10b981',ms:'#8b5cf6',fitb:'#f59e0b',mat:'#ef4444',ord:'#06b6d4'};
var TYPE_NAMES={mc:'Multiple Choice',tf:'True / False',ms:'Multi-Select',fitb:'Fill in Blank',mat:'Matching',ord:'Ordering'};
var TYPE_SHORT={mc:'MC',tf:'TF',ms:'MS',fitb:'FB',mat:'MT',ord:'OR'};
var ENTITY_ID='qm2-quizzes';

// =================== STATE ===================
var quizzes=[];
var currentQuiz=null;
var currentSlideIdx=0;
var rpTab='content';
var wizStep=0;
var wizData={title:'',description:'',theme:THEMES[0],font:'Arial',counts:{mc:3,tf:0,ms:0,fitb:0,mat:0,ord:0}};

function uid(){return 'q'+Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function today(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

// =================== PERSISTENCE ===================
function saveAll(){
  try{localStorage.setItem(ENTITY_ID,JSON.stringify(quizzes));}
  catch(e){console.error('Save error:',e);}
}

function saveQuiz(q){
  try{
    var found=false;
    for(var i=0;i<quizzes.length;i++){if(quizzes[i].id===q.id){quizzes[i]=q;found=true;break;}}
    if(!found)quizzes.push(q);
    localStorage.setItem(ENTITY_ID,JSON.stringify(quizzes));
  }catch(e){console.error('Save error:',e);}
}

function deleteQuizFromStorage(qId){
  try{
    quizzes=quizzes.filter(function(q){return q.id!==qId;});
    localStorage.setItem(ENTITY_ID,JSON.stringify(quizzes));
  }catch(e){console.error('Delete error:',e);}
}

function loadAllQuizzes(){
  try{
    var stored=localStorage.getItem(ENTITY_ID);
    if(!stored)return;
    var loaded=JSON.parse(stored);
    if(!Array.isArray(loaded)||loaded.length===0)return;
    quizzes=loaded;
    for(var i=0;i<quizzes.length;i++){
      if(!quizzes[i].theme||!quizzes[i].theme.id)quizzes[i].theme=THEMES[0];
      if(!quizzes[i].fontFamily)quizzes[i].fontFamily='Arial';
      if(!quizzes[i].bgType)quizzes[i].bgType='solid';
      if(quizzes[i].bgGradientIdx===undefined)quizzes[i].bgGradientIdx=0;
      if(!quizzes[i].btnStyle)quizzes[i].btnStyle='rounded';
      if(!quizzes[i].slides)quizzes[i].slides=[];
      if(quizzes[i].passScore===undefined)quizzes[i].passScore=70;
      if(quizzes[i].shuffle===undefined)quizzes[i].shuffle=false;
      if(quizzes[i].showFeedback===undefined)quizzes[i].showFeedback=true;
      if(!quizzes[i].passingMessage)quizzes[i].passingMessage='Congratulations! You passed!';
      if(!quizzes[i].failingMessage)quizzes[i].failingMessage='Keep practicing!';
    }
  }catch(e){console.error('Load error:',e);}
}

// =================== SCREEN MANAGEMENT ===================
function showScreen(name){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='home') renderHome();
  else if(name==='wizard') renderWizard();
  else if(name==='editor') renderEditor();
  else if(name==='preview') renderPreview();
}

// =================== HOME SCREEN ===================
function renderHome(){
  var hc=document.getElementById('home-content');
  hc.innerHTML='<div style="background:#fff;border-radius:20px;padding:36px 32px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.3);color:#0f172a;">'
    +'<div style="font-size:42px;margin-bottom:8px;">🎯</div>'
    +'<h1 style="font-size:26px;font-weight:800;margin-bottom:4px;color:#0f172a;">Quizmaker 2.0</h1>'
    +'<p style="color:#64748b;font-size:14px;margin-bottom:24px;">Create beautiful, interactive quizzes in minutes</p>'
    +'<button id="home-create" class="btn-primary" style="width:100%;margin-bottom:10px;padding:14px;">✏️ Create New Quiz</button>'
    +'<button id="home-import" class="btn-outline" style="width:100%;padding:12px;">📂 Open .qz2 File</button>'
    +'</div>';
  document.getElementById('home-create').addEventListener('click',function(){
    wizStep=0;wizData={title:'',description:'',theme:THEMES[0],font:'Arial',counts:{mc:3,tf:0,ms:0,fitb:0,mat:0,ord:0}};
    showScreen('wizard');
  });
  document.getElementById('home-import').addEventListener('click',importQZ2);

  var hg=document.getElementById('home-grid');
  if(quizzes.length===0){
    hg.innerHTML='<p style="text-align:center;color:#475569;font-size:13px;margin-top:12px;">No saved quizzes yet.</p>';
    return;
  }
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';
  var td=today();
  for(var i=0;i<quizzes.length;i++){
    var q=quizzes[i];
    var isNew=q.created===td;
    h+='<div class="quiz-card-home" data-qidx="'+i+'">'
      +(isNew?'<span class="new-badge">New</span>':'')
      +'<div style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(q.title||'Untitled')+'</div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;">'+q.slides.length+' slide'+(q.slides.length!==1?'s':'')+'</div>'
      +'<div style="display:flex;gap:6px;">'
      +'<button class="btn-primary home-edit-btn" data-qidx="'+i+'" style="padding:6px 14px;font-size:12px;flex:1;">Edit</button>'
      +'<button class="btn-ghost home-del-btn" data-qidx="'+i+'" style="padding:6px 8px;font-size:12px;color:#ef4444;" title="Delete quiz">🗑</button>'
      +'</div>'
      +'</div>';
  }
  h+='</div>';
  hg.innerHTML=h;
  hg.querySelectorAll('.home-edit-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute('data-qidx'));
      currentQuiz=quizzes[idx];currentSlideIdx=0;rpTab='content';
      showScreen('editor');
    });
  });
  hg.querySelectorAll('.home-del-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute('data-qidx'));
      if(confirm('Delete "'+quizzes[idx].title+'"? This cannot be undone.')){
        var removed=quizzes.splice(idx,1)[0];
        deleteQuizFromStorage(removed.id);
        renderHome();
      }
    });
  });
}

// =================== WIZARD ===================
function renderWizard(){
  var c=document.getElementById('wizard-card');
  var dots='<div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px;">';
  for(var i=0;i<3;i++) dots+='<div style="width:10px;height:10px;border-radius:50%;background:'+(i===wizStep?'#2563eb':'#e2e8f0')+';transition:background 0.2s;"></div>';
  dots+='</div>';

  var body='';
  if(wizStep===0){
    body='<h2 style="font-size:20px;font-weight:800;margin-bottom:4px;">Create a New Quiz</h2>'
      +'<p style="color:#64748b;font-size:13px;margin-bottom:20px;">Step 1: Name your quiz</p>'
      +'<label style="font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:4px;">QUIZ TITLE</label>'
      +'<input id="wiz-title" class="rp-input" placeholder="e.g., Biology Chapter 5" value="'+esc(wizData.title)+'" style="margin-bottom:14px;">'
      +'<label style="font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:4px;">DESCRIPTION (optional)</label>'
      +'<textarea id="wiz-desc" class="rp-textarea" placeholder="Brief description..." rows="3">'+esc(wizData.description)+'</textarea>'
      +'<div style="display:flex;gap:10px;margin-top:20px;">'
      +'<button id="wiz-back0" class="btn-ghost" style="color:#64748b;">← Back</button>'
      +'<button id="wiz-next0" class="btn-primary" style="flex:1;">Next →</button>'
      +'</div>';
  } else if(wizStep===1){
    body='<h2 style="font-size:20px;font-weight:800;margin-bottom:4px;">Choose a Theme</h2>'
      +'<p style="color:#64748b;font-size:13px;margin-bottom:16px;">Step 2: Pick your quiz\'s look</p>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">';
    for(var i=0;i<THEMES.length;i++){
      var t=THEMES[i];
      body+='<div class="swatch wiz-theme-sw'+(wizData.theme.id===t.id?' active':'')+'" data-tidx="'+i+'" style="background:'+t.primary+';width:100%;height:40px;" title="'+t.name+'"></div>';
    }
    body+='</div>'
      +'<label style="font-size:12px;font-weight:700;color:#64748b;display:block;margin-bottom:4px;">FONT FAMILY</label>'
      +'<select id="wiz-font" class="rp-input" style="margin-bottom:6px;">';
    for(var i=0;i<FONTS.length;i++) body+='<option'+(wizData.font===FONTS[i]?' selected':'')+'>'+FONTS[i]+'</option>';
    body+='</select>'
      +'<div style="display:flex;gap:10px;margin-top:20px;">'
      +'<button id="wiz-back1" class="btn-ghost" style="color:#64748b;">← Back</button>'
      +'<button id="wiz-next1" class="btn-primary" style="flex:1;">Next →</button>'
      +'</div>';
  } else {
    body='<h2 style="font-size:20px;font-weight:800;margin-bottom:4px;">Add Questions</h2>'
      +'<p style="color:#64748b;font-size:13px;margin-bottom:16px;">Step 3: Choose how many of each type</p>';
    var types=['mc','tf','ms','fitb','mat','ord'];
    for(var i=0;i<types.length;i++){
      var t=types[i];
      body+='<div class="stepper">'
        +'<span class="type-badge" style="background:'+TYPE_COLORS[t]+';">'+TYPE_SHORT[t]+'</span>'
        +'<span class="stepper-label">'+TYPE_NAMES[t]+'</span>'
        +'<button class="wiz-dec" data-st="'+t+'" style="background:#e2e8f0;color:#0f172a;">−</button>'
        +'<span class="stepper-val" id="wiz-cnt-'+t+'">'+wizData.counts[t]+'</span>'
        +'<button class="wiz-inc" data-st="'+t+'" style="background:#2563eb;color:#fff;">+</button>'
        +'</div>';
    }
    body+='<div style="display:flex;gap:10px;margin-top:20px;">'
      +'<button id="wiz-back2" class="btn-ghost" style="color:#64748b;">← Back</button>'
      +'<button id="wiz-create" class="btn-primary" style="flex:1;">🚀 Create Quiz</button>'
      +'</div>';
  }

  c.innerHTML=dots+body;

  // Events
  if(wizStep===0){
    document.getElementById('wiz-back0').addEventListener('click',function(){showScreen('home');});
    document.getElementById('wiz-next0').addEventListener('click',function(){
      wizData.title=document.getElementById('wiz-title').value.trim()||'Untitled Quiz';
      wizData.description=document.getElementById('wiz-desc').value.trim();
      wizStep=1;renderWizard();
    });
  } else if(wizStep===1){
    c.querySelectorAll('.wiz-theme-sw').forEach(function(sw){
      sw.addEventListener('click',function(){
        wizData.theme=THEMES[parseInt(this.getAttribute('data-tidx'))];
        renderWizard();
      });
    });
    document.getElementById('wiz-back1').addEventListener('click',function(){wizStep=0;renderWizard();});
    document.getElementById('wiz-next1').addEventListener('click',function(){
      wizData.font=document.getElementById('wiz-font').value;
      wizStep=2;renderWizard();
    });
  } else {
    c.querySelectorAll('.wiz-dec').forEach(function(b){
      b.addEventListener('click',function(){
        var t=this.getAttribute('data-st');
        if(wizData.counts[t]>0)wizData.counts[t]--;
        document.getElementById('wiz-cnt-'+t).textContent=wizData.counts[t];
      });
    });
    c.querySelectorAll('.wiz-inc').forEach(function(b){
      b.addEventListener('click',function(){
        var t=this.getAttribute('data-st');
        if(wizData.counts[t]<50)wizData.counts[t]++;
        document.getElementById('wiz-cnt-'+t).textContent=wizData.counts[t];
      });
    });
    document.getElementById('wiz-back2').addEventListener('click',function(){wizStep=1;renderWizard();});
    document.getElementById('wiz-create').addEventListener('click',function(){
      var totalCount=0;
      var keys=Object.keys(wizData.counts);
      for(var i=0;i<keys.length;i++) totalCount+=wizData.counts[keys[i]];
      if(totalCount===0){alert('Please add at least one question.');return;}
      var q=mkQuiz(wizData);
      quizzes.push(q);saveQuiz(q);
      currentQuiz=q;currentSlideIdx=0;rpTab='content';
      showScreen('editor');
    });
  }
}

function mkQuiz(wd){
  var q={id:uid(),title:wd.title,description:wd.description,passScore:70,shuffle:false,showFeedback:true,
    fontFamily:wd.font,bgType:'solid',bgGradientIdx:0,btnStyle:'rounded',
    passingMessage:'Congratulations! You passed!',failingMessage:'Keep practicing!',
    theme:JSON.parse(JSON.stringify(wd.theme)),slides:[],created:today()};
  var types=['mc','tf','ms','fitb','mat','ord'];
  for(var ti=0;ti<types.length;ti++){
    var t=types[ti];
    for(var i=0;i<wd.counts[t];i++) q.slides.push(mkSlide(t));
  }
  return q;
}

function mkSlide(qType){
  var s={id:uid(),qType:qType,question:'',points:10,feedback:{enabled:false,correct:'',incorrect:''}};
  if(qType==='mc'){s.options=['Option A','Option B','Option C','Option D'];s.correct=0;}
  else if(qType==='tf'){s.correct=0;}
  else if(qType==='ms'){s.options=['Option A','Option B','Option C','Option D'];s.correct=[0];}
  else if(qType==='fitb'){s.correctAnswer='';}
  else if(qType==='mat'){s.pairs=[{left:'Term 1',right:'Definition 1'},{left:'Term 2',right:'Definition 2'}];}
  else if(qType==='ord'){s.items=['First','Second','Third','Fourth'];}
  return s;
}

function currentSlide(){return currentQuiz&&currentQuiz.slides[currentSlideIdx]?currentQuiz.slides[currentSlideIdx]:null;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Safely encode quiz JSON for embedding inside a <script> tag
function safeJsonForScript(obj){
  return JSON.stringify(obj).replace(/<\//g,'<\\/').replace(/<!--/g,'<\\!--');
}

      +'<span style="font-size:12px;color:#cbd5e1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(s.question||'Untitled')+'</span>'

      +'<button class="action-btn-sm sb-move-up" data-sidx="'+i+'"'+(i===0?' disabled':'')+' title="Move up">▲</button>'
      +'<button class="action-btn-sm sb-move-dn" data-sidx="'+i+'"'+(i===q.slides.length-1?' disabled':'')+' title="Move down">▼</button>'
      +'<button class="action-btn-sm sb-del" data-sidx="'+i+'" title="Delete" style="color:#ef4444;">🗑</button>'
      +'</div></div>';
  }
  h+='</div>'
    +'<div style="padding:10px 12px;border-top:1px solid #334155;">'
    +'<button id="sb-home" class="btn-ghost" style="width:100%;text-align:left;">← Home</button>'
    +'</div>';

  document.getElementById('sb-add-slide').addEventListener('click',showTypePicker);
  document.getElementById('sb-home').addEventListener('click',function(){showScreen('home');});
  sb.querySelectorAll('.slide-item').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.slide-actions'))return;
      currentSlideIdx=parseInt(this.getAttribute('data-sidx'));
      rpTab='content';renderEditor();
    });
  });
  sb.querySelectorAll('.sb-move-up').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();moveSlide(parseInt(this.getAttribute('data-sidx')),-1);});
  });

    b.addEventListener('click',function(e){e.stopPropagation();moveSlide(parseInt(this.getAttribute('data-sidx')),1);});
  });

    b.addEventListener('click',function(e){e.stopPropagation();deleteSlide(parseInt(this.getAttribute('data-sidx')));});
  });
}

function moveSlide(idx,dir){
  var ni=idx+dir;
  if(ni<0||ni>=currentQuiz.slides.length)return;
  var tmp=currentQuiz.slides[idx];
  currentQuiz.slides[idx]=currentQuiz.slides[ni];
  currentQuiz.slides[ni]=tmp;
  currentSlideIdx=ni;saveQuiz(currentQuiz);renderSidebar();renderCanvas();
}

function deleteSlide(idx){
  if(currentQuiz.slides.length<=1){alert('Quiz must have at least one slide.');return;}
  currentQuiz.slides.splice(idx,1);
  if(currentSlideIdx>=currentQuiz.slides.length)currentSlideIdx=currentQuiz.slides.length-1;
  saveQuiz(currentQuiz);renderEditor();
}

function addSlide(qType){
  var s=mkSlide(qType);
  currentQuiz.slides.push(s);
  currentSlideIdx=currentQuiz.slides.length-1;
  saveQuiz(currentQuiz);rpTab='content';renderEditor();
}

  modal.querySelector('#modal-cancel').addEventListener('click',function(){document.body.removeChild(modal);});

    btn.addEventListener('mouseenter',function(){this.style.borderColor=TYPE_COLORS[this.getAttribute('data-qtype')];this.style.background='#f8fafc';});

  if(!s){cv.innerHTML='<div style="text-align:center;color:'+q.theme.muted+';padding:60px;">No slides yet. Add one!</div>';return;}

  var borderR=q.btnStyle==='pill'?'999px':q.btnStyle==='sharp'?'2px':'8px';
  var fontFamily=q.fontFamily||'Arial';
  var h='<div style="background:'+q.theme.card+';border-radius:16px;max-width:560px;width:100%;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);font-family:'+fontFamily+',sans-serif;">'

    +'</div>'
    +'<div style="font-size:20px;font-weight:700;color:'+q.theme.text+';min-height:40px;margin-bottom:24px;line-height:1.4;">'+(esc(s.question)||'<span style="color:'+q.theme.muted+';">Type your question here...</span>')+'</div>';

  if(s.qType==='mc'||s.qType==='ms'){
    var opts=s.options||[];
    var correctArr=s.qType==='ms'?(s.correct||[]):[s.correct];
    for(var i=0;i<opts.length;i++){
      var isCor=correctArr.indexOf(i)>=0;
      h+='<div style="padding:14px 18px;border:2px solid '+(isCor?q.theme.primary:q.theme.border)+';border-radius:'+borderR+';margin-bottom:12px;color:'+q.theme.text+';font-size:14px;'
        +(isCor?'background:'+q.theme.primary+';color:#fff;font-weight:600;':'')

    for(var i=0;i<2;i++){

      h+='<div style="padding:14px 18px;border:2px solid '+(isCor?q.theme.primary:q.theme.border)+';border-radius:'+borderR+';margin-bottom:12px;color:'+q.theme.text+';font-size:14px;'
        +(isCor?'background:'+q.theme.primary+';color:#fff;font-weight:600;':'')
        +'">'+labels[i]+'</div>';
    }
  } else if(s.qType==='fitb'){
    h+='<div style="padding:14px 18px;border:2px dashed '+q.theme.border+';border-radius:'+borderR+';color:'+q.theme.muted+';font-size:14px;">Student types answer here...</div>';
    if(s.correctAnswer) h+='<div style="margin-top:8px;font-size:12px;color:'+q.theme.primary+';font-weight:600;">Answer: '+esc(s.correctAnswer)+'</div>';
  } else if(s.qType==='mat'){
    var pairs=s.pairs||[];

    h+='<div style="font-size:11px;font-weight:700;color:'+q.theme.muted+';text-transform:uppercase;padding:0 0 4px;">Terms</div>';
    h+='<div style="font-size:11px;font-weight:700;color:'+q.theme.muted+';text-transform:uppercase;padding:0 0 4px;">Definitions</div>';

      h+='<div style="padding:10px 14px;border:2px solid '+q.theme.border+';border-radius:'+borderR+';font-size:13px;color:'+q.theme.text+';">'+esc(pairs[i].left)+'</div>';

function bindContentTab(q,s){
  var rp=document.getElementById('editor-rpanel');

  // Question type switch
  rp.querySelectorAll('.rp-qtype-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var newT=this.getAttribute('data-qt');
      if(newT===s.qType)return;
      var ns=mkSlide(newT);
      ns.question=s.question;
      ns.points=s.points;
      ns.feedback={enabled:s.feedback.enabled,correct:s.feedback.correct||'',incorrect:s.feedback.incorrect||''};
      ns.id=s.id;
      currentQuiz.slides[currentSlideIdx]=ns;saveQuiz(currentQuiz);renderEditor();
    });
  });

  // Points
  var ptsEl=document.getElementById('rp-points');
  if(ptsEl) ptsEl.addEventListener('input',function(){
    var slide=currentSlide();
    if(!slide)return;
    slide.points=parseInt(this.value)||0;saveQuiz(currentQuiz);
    var lbl=document.getElementById('canvas-points-label');
    if(lbl)lbl.textContent=slide.points+' pts';
  });

  // Question
  var qEl=document.getElementById('rp-question');
  if(qEl) qEl.addEventListener('input',function(){
    var slide=currentSlide();
    if(!slide)return;
    slide.question=this.value;saveQuiz(currentQuiz);renderCanvas();renderSidebar();
  });

  // MC
  if(s.qType==='mc'){
    rp.querySelectorAll('input[name="mc-correct"]').forEach(function(r){
      r.addEventListener('change',function(){s.correct=parseInt(this.value);saveQuiz(currentQuiz);renderCanvas();});
    });
    rp.querySelectorAll('.rp-mc-opt').forEach(function(inp){

// =================== IMPORT / EXPORT ===================
function exportQZ2(){
  var json=JSON.stringify(currentQuiz,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(currentQuiz.title||'quiz').replace(/[^a-z0-9]/gi,'_')+'.qz2';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
}

function importQZ2(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.qz2,.json';
  inp.addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.addEventListener('load',function(ev){
      try{
        var q=JSON.parse(ev.target.result);
        q.theme=q.theme||THEMES[0];
        q.created=q.created||today();
        if(!q.id) q.id=uid();
        if(!q.fontFamily) q.fontFamily='Arial';
        if(!q.bgType) q.bgType='solid';
        if(q.bgGradientIdx===undefined) q.bgGradientIdx=0;
        if(!q.btnStyle) q.btnStyle='rounded';
        if(!q.slides) q.slides=[];
        if(q.passScore===undefined) q.passScore=70;
        if(q.shuffle===undefined) q.shuffle=false;
        if(q.showFeedback===undefined) q.showFeedback=true;
        if(!q.passingMessage) q.passingMessage='Congratulations! You passed!';
        if(!q.failingMessage) q.failingMessage='Keep practicing!';
        // Validate slides
        for(var i=0;i<q.slides.length;i++){
          var sl=q.slides[i];
          if(!sl.id) sl.id=uid();
          if(!sl.feedback) sl.feedback={enabled:false,correct:'',incorrect:''};
          if(sl.points===undefined) sl.points=10;
        }
        quizzes.push(q);saveQuiz(q);
        currentQuiz=q;currentSlideIdx=0;rpTab='content';
        showScreen('editor');
      }catch(err){alert('Invalid file: '+err.message);}
    });
    r.readAsText(f);
  });
  inp.click();
}

// =================== SCORM ===================
function buildZip(files){
  function strToBytes(str){
    var encoder=new TextEncoder();
    return encoder.encode(str);
  }
  function uint16LE(n){return[n&0xff,(n>>8)&0xff];}
  function uint32LE(n){return[n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff];}
  function crc32(data){var table=[];for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);table[i]=c;}var crc=0xFFFFFFFF;for(var i=0;i<data.length;i++)crc=table[(crc^data[i])&0xff]^(crc>>>8);return(crc^0xFFFFFFFF)>>>0;}
  var localHeaders=[],centralDirs=[],offset=0;
  for(var fi=0;fi<files.length;fi++){
    var file=files[fi],nameBytes=strToBytes(file.name),dataBytes=strToBytes(file.data),crc=crc32(dataBytes),size=dataBytes.length;
    var lh=[0x50,0x4b,0x03,0x04].concat(uint16LE(20)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint32LE(crc)).concat(uint32LE(size)).concat(uint32LE(size)).concat(uint16LE(nameBytes.length)).concat(uint16LE(0));
    var localEntry=lh.concat(Array.from(nameBytes)).concat(Array.from(dataBytes));
    localHeaders.push(localEntry);
    var cd=[0x50,0x4b,0x01,0x02].concat(uint16LE(20)).concat(uint16LE(20)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint32LE(crc)).concat(uint32LE(size)).concat(uint32LE(size)).concat(uint16LE(nameBytes.length)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(0)).concat(uint32LE(0)).concat(uint32LE(offset));
    centralDirs.push(cd.concat(Array.from(nameBytes)));
    offset+=localEntry.length;
  }
  var centralDirBytes=[],centralDirSize=0;
  for(var i=0;i<centralDirs.length;i++){centralDirBytes=centralDirBytes.concat(centralDirs[i]);centralDirSize+=centralDirs[i].length;}
  var eocd=[0x50,0x4b,0x05,0x06].concat(uint16LE(0)).concat(uint16LE(0)).concat(uint16LE(files.length)).concat(uint16LE(files.length)).concat(uint32LE(centralDirSize)).concat(uint32LE(offset)).concat(uint16LE(0));
  var allBytes=[];
  for(var i=0;i<localHeaders.length;i++)allBytes=allBytes.concat(localHeaders[i]);
  allBytes=allBytes.concat(centralDirBytes).concat(eocd);
  return new Uint8Array(allBytes);
}

function buildSCORMManifest(quiz){
  return '<?xml version="1.0" encoding="UTF-8"?>\n'
    +'<manifest identifier="QUIZMAKER2_MANIFEST" version="1"\n'
    +'  xmlns="http://www.imsproject.org/xsd/imscp_rootv1p1p2"\n'
    +'  xmlns:adlcp="http://www.adlnet.org/xsd/adlcp_rootv1p2"\n'
    +'  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"\n'
    +'  xsi:schemaLocation="http://www.imsproject.org/xsd/imscp_rootv1p1p2 imscp_rootv1p1p2.xsd">\n'
    +'  <metadata><schema>ADL SCORM</schema><schemaversion>1.2</schemaversion></metadata>\n'
    +'  <organizations default="ORG1">\n'
    +'    <organization identifier="ORG1">\n'
    +'      <title>'+esc(quiz.title)+'</title>\n'
    +'      <item identifier="ITEM1" identifierref="RES1">\n'
    +'        <title>'+esc(quiz.title)+'</title>\n'
    +'        <adlcp:masteryscore>'+quiz.passScore+'</adlcp:masteryscore>\n'
    +'      </item>\n'
    +'    </organization>\n'
    +'  </organizations>\n'
    +'  <resources>\n'
    +'    <resource identifier="RES1" type="webcontent" adlcp:scormtype="sco" href="index.html">\n'
    +'      <file href="index.html"/>\n'
    +'    </resource>\n'
    +'  </resources>\n'
    +'</manifest>';
}

function exportSCORM(){
  var manifest=buildSCORMManifest(currentQuiz);
  var player=buildPlayerHTML(currentQuiz,true);
  var zipBytes=buildZip([
    {name:'imsmanifest.xml',data:manifest},
    {name:'index.html',data:player}
  ]);
  var blob=new Blob([zipBytes],{type:'application/zip'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(currentQuiz.title||'quiz').replace(/[^a-z0-9]/gi,'_')+'_scorm12.zip';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},3000);
}

function renderPreview(){
  var pv=document.getElementById('screen-preview');
  var q=currentQuiz;
  var slides=q.slides.slice();
  if(q.shuffle){for(var i=slides.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=slides[i];slides[i]=slides[j];slides[j]=t;}}
  var pvState={ci:0,score:0,totalPts:0,answered:false,slides:slides,userAnswer:null};
  for(var i=0;i<slides.length;i++) pvState.totalPts+=slides[i].points;
  var borderR=q.btnStyle==='pill'?'999px':q.btnStyle==='sharp'?'2px':'8px';
  var fontFamily=q.fontFamily||'Arial';

  function pvRender(){
    if(pvState.ci>=pvState.slides.length){pvShowResults();return;}
    pvState.answered=false;pvState.userAnswer=null;
    var s=pvState.slides[pvState.ci];
    var pct=Math.round((pvState.ci/pvState.slides.length)*100);
    var bgStyle=q.bgType==='gradient'?'background:'+BG_GRADIENTS[q.bgGradientIdx||0]+';':'background:'+q.theme.bg+';';
    var h='<div style="background:'+q.theme.primary+';color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;">'
      +'<strong style="font-size:14px;">'+esc(q.title)+'</strong>'
      +'<button id="pv-exit" style="background:none;border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;">✕ Exit Preview</button>'
      +'</div>'
      +'<div style="height:4px;background:'+q.theme.border+';"><div style="height:100%;width:'+pct+'%;background:'+q.theme.primary+';transition:width 0.3s;"></div></div>'
      +'<div style="flex:1;display:flex;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto;'+bgStyle+'">'
      +'<div style="max-width:580px;width:100%;background:'+q.theme.card+';border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);font-family:'+fontFamily+',sans-serif;">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:16px;">'
      +'<span style="font-size:12px;font-weight:700;color:'+q.theme.muted+';">Question '+(pvState.ci+1)+' of '+pvState.slides.length+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:'+q.theme.muted+';background:'+q.theme.bg+';padding:3px 10px;border-radius:20px;">'+s.points+' pts</span>'
      +'</div>'
      +'<div style="font-size:20px;font-weight:700;color:'+q.theme.text+';margin-bottom:24px;line-height:1.4;">'+esc(s.question||'(No question text)')+'</div>'
      +'<div id="pv-ans"></div>'
      +'<button id="pv-submit" class="btn-primary" style="width:100%;margin-top:24px;padding:14px;border-radius:'+borderR+';" disabled>Submit Answer</button>'
      +'<div id="pv-fb"></div>'
      +'</div></div>';
    pv.innerHTML=h;
    document.getElementById('pv-exit').addEventListener('click',function(){showScreen('editor');});
    pvRenderAnswers(s);
    pvBindSubmit(s);
  }

  function pvRenderAnswers(s){
    var area=document.getElementById('pv-ans');
    var h='';
    if(s.qType==='mc'){
      var opts=s.options||[];
      for(var i=0;i<opts.length;i++) h+='<button class="pv-opt" data-idx="'+i+'" style="display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid '+q.theme.border+';border-radius:'+borderR+';margin-bottom:12px;background:'+q.theme.card+';color:'+q.theme.text+';font-size:15px;cursor:pointer;transition:all 0.15s;font-family:'+fontFamily+',sans-serif;">'+esc(opts[i])+'</button>';

          pvState.userAnswer=parseInt(this.getAttribute('data-idx'));
          area.querySelectorAll('.pv-opt').forEach(function(x){x.style.background=q.theme.card;x.style.color=q.theme.text;x.style.borderColor=q.theme.border;});

          document.getElementById('pv-submit').disabled=false;
        });
      });
    } else if(s.qType==='tf'){
      ['True','False'].forEach(function(lbl,i){
        h+='<button class="pv-opt" data-idx="'+i+'" style="display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid '+q.theme.border+';border-radius:'+borderR+';margin-bottom:12px;background:'+q.theme.card+';color:'+q.theme.text+';font-size:15px;cursor:pointer;font-family:'+fontFamily+',sans-serif;">'+lbl+'</button>';
      });
      area.innerHTML=h;
      area.querySelectorAll('.pv-opt').forEach(function(b){
        b.addEventListener('click',function(){
          pvState.userAnswer=parseInt(this.getAttribute('data-idx'));

          this.style.background=q.theme.primary;this.style.color='#fff';this.style.borderColor=q.theme.primary;
          document.getElementById('pv-submit').disabled=false;
        });
      });
    } else if(s.qType==='ms'){
      pvState.userAnswer=[];
      var opts=s.options||[];
      for(var i=0;i<opts.length;i++) h+='<button class="pv-opt" data-idx="'+i+'" style="display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid '+q.theme.border+';border-radius:'+borderR+';margin-bottom:12px;background:'+q.theme.card+';color:'+q.theme.text+';font-size:15px;cursor:pointer;font-family:'+fontFamily+',sans-serif;">'+esc(opts[i])+'</button>';

          b.addEventListener('click',function(){
            var i=parseInt(this.getAttribute('data-oi'));if(i===0)return;
            var t=pvState.userAnswer[i];pvState.userAnswer[i]=pvState.userAnswer[i-1];pvState.userAnswer[i-1]=t;renderOrdList();
          });
        });
        ol.querySelectorAll('.pv-ord-dn').forEach(function(b){
          b.addEventListener('click',function(){
            var i=parseInt(this.getAttribute('data-oi'));if(i>=pvState.userAnswer.length-1)return;
            var t=pvState.userAnswer[i];pvState.userAnswer[i]=pvState.userAnswer[i+1];pvState.userAnswer[i+1]=t;renderOrdList();
          });
        });
      }
      renderOrdList();
    }
  }

  function pvBindSubmit(s){
    document.getElementById('pv-submit').addEventListener('click',function(){
      if(pvState.answered)return;pvState.answered=true;
      var correct=false;
      if(s.qType==='mc') correct=pvState.userAnswer===s.correct;
      else if(s.qType==='tf') correct=pvState.userAnswer===s.correct;
      else if(s.qType==='ms'){var sc=s.correct||[];correct=Array.isArray(pvState.userAnswer)&&pvState.userAnswer.length===sc.length&&sc.every(function(c){return pvState.userAnswer.indexOf(c)>=0;});}
      else if(s.qType==='fitb') correct=(pvState.userAnswer||'').toLowerCase()===(s.correctAnswer||'').toLowerCase();
      else if(s.qType==='mat'){correct=true;var pairs=s.pairs||[];for(var i=0;i<pairs.length;i++){if(pvState.userAnswer[String(i)]!==pairs[i].right)correct=false;}}
      else if(s.qType==='ord'){correct=true;var items=s.items||[];for(var i=0;i<items.length;i++){if(!pvState.userAnswer||pvState.userAnswer[i]!==items[i])correct=false;}}
      if(correct) pvState.score+=s.points;

      if(q.showFeedback){
        var msg=correct?'✅ Correct!':'❌ Incorrect.';
        if(s.feedback&&s.feedback.enabled) msg+=correct?(s.feedback.correct?' '+s.feedback.correct:''):(s.feedback.incorrect?' '+s.feedback.incorrect:'');
        var fb=document.getElementById('pv-fb');
        fb.innerHTML='<div style="margin-top:16px;padding:14px 18px;border-radius:10px;font-size:14px;font-weight:600;'
          +(correct?'background:#dcfce7;color:#166534;':'background:#fee2e2;color:#991b1b;')+'">'+msg+'</div>'
          +'<button id="pv-next" class="btn-primary" style="width:100%;margin-top:12px;padding:14px;border-radius:'+borderR+';">Next →</button>';
        document.getElementById('pv-submit').style.display='none';
        document.getElementById('pv-next').addEventListener('click',function(){pvState.ci++;pvRender();});
      } else {
        pvState.ci++;pvRender();
      }
    });
  }

  function pvShowResults(){
    var pctVal=pvState.totalPts>0?Math.round((pvState.score/pvState.totalPts)*100):0;
    var passed=pctVal>=q.passScore;
    var bgStyle=q.bgType==='gradient'?'background:'+BG_GRADIENTS[q.bgGradientIdx||0]+';':'background:'+q.theme.bg+';';
    pv.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;'+bgStyle+'">'
      +'<div style="max-width:480px;width:90%;background:'+q.theme.card+';border-radius:20px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1);font-family:'+fontFamily+',sans-serif;">'
      +'<div style="font-size:56px;font-weight:800;color:'+q.theme.primary+';">'+pctVal+'%</div>'
      +'<div style="display:inline-block;padding:4px 16px;border-radius:999px;font-size:13px;font-weight:700;margin:12px 0 16px;color:#fff;background:'+(passed?'#16a34a':'#ef4444')+';">'+(passed?'PASSED':'NOT PASSED')+'</div>'
      +'<p style="color:'+q.theme.text+';font-size:16px;margin-bottom:8px;">'+esc(passed?q.passingMessage:q.failingMessage)+'</p>'
      +'<p style="color:'+q.theme.muted+';font-size:13px;margin-bottom:24px;">Score: '+pvState.score+' / '+pvState.totalPts+'</p>'
      +'<button id="pv-retake" style="padding:12px 24px;background:'+q.theme.primary+';color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;margin-right:8px;">↩ Retake</button>'
      +'<button id="pv-exit-r" style="padding:12px 24px;background:transparent;border:2px solid '+q.theme.primary+';color:'+q.theme.primary+';border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;">✕ Exit</button>'
      +'</div></div>';
    document.getElementById('pv-retake').addEventListener('click',function(){
      pvState.ci=0;pvState.score=0;pvState.answered=false;
      if(q.shuffle){for(var i=pvState.slides.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pvState.slides[i];pvState.slides[i]=pvState.slides[j];pvState.slides[j]=t;}}
      pvRender();
    });
    document.getElementById('pv-exit-r').addEventListener('click',function(){showScreen('editor');});
  }

  pvRender();
}

// =================== INIT ===================
function init(){
  loadAllQuizzes();
  renderHome();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
